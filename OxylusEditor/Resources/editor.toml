version = 10

[[shader_sessions]]
root_directory = "../../Oxylus/src/Render/Shaders"
session_name = "editor"
debug_symbols = false
optimization = "default"

[[shader_sessions.programs]]
name = "mouse_picking_pipeline_2d"
path = "editor/mouse_picking_2d.slang"
entry_points = ["cs_main"]

[[shader_sessions.programs]]
name = "mouse_picking_pipeline"
path = "editor/mouse_picking.slang"
entry_points = ["cs_main"]

[[shader_sessions.programs]]
name = "highlighting_pipeline"
path = "editor/highlighting.slang"
entry_points = ["cs_main"]

[[shader_sessions.programs]]
name = "apply_highlighting_pipeline"
path = "editor/apply_highlighting.slang"
entry_points = ["vs_main", "fs_main"]

[[shader_sessions.programs]]
name = "grid_pipeline"
path = "editor/grid.slang"
entry_points = ["vs_main", "fs_main"]

[[shader_sessions.programs]]
name = "apply_grid_pipeline"
path = "editor/apply_grid.slang"
entry_points = ["vs_main", "fs_main"]
